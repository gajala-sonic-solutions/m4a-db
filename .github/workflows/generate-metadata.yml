name: Generate Metadata

on:
  release:
    types:
      - published
      - edited
      - deleted

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          node <<'EOF'

          const fs = require('fs')
          const path = require('path')

          const OWNER = 'gajala-sonic-solutions'
          const REPO = 'm4a-db'

          const API =
            `https://api.github.com/repos/${OWNER}/${REPO}/releases`

          async function github(url) {
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                Accept:
                  'application/vnd.github+json',
              },
            })

            if (!res.ok) {
              throw new Error(
                `GitHub API failed: ${res.status}`
              )
            }

            return await res.json()
          }

          function normalizeText(text) {
            return text.replace(/_/g, ' ')
          }

          function parseArtists(raw) {
            return raw
              .split('+')
              .map(a =>
                normalizeText(a.trim())
              )
          }

          function parseFilename(filename) {
            const clean =
              filename.replace(
                /\.m4a$/i,
                ''
              )

            const parts =
              clean.split('--')

            if (parts.length !== 3) {
              throw new Error(
                `Invalid filename: ${filename}`
              )
            }

            const [
              trackRaw,
              singersRaw,
              titleRaw,
            ] = parts

            return {
              trackNumber:
                Number(trackRaw),

              title:
                normalizeText(
                  titleRaw
                ),

              artists:
                parseArtists(
                  singersRaw
                ),

              artistsDisplay:
                parseArtists(
                  singersRaw
                ).join(', '),
            }
          }

          function parseReleaseName(name) {
            const parts =
              name.split('--')

            if (parts.length !== 3) {
              throw new Error(
                `Invalid release name: ${name}`
              )
            }

            return {
              primaryArtist:
                normalizeText(
                  parts[0]
                ),

              title:
                normalizeText(
                  parts[1]
                ),

              year:
                normalizeText(
                  parts[2]
                ),
            }
          }

          function parseBody(body) {
            const lines =
              (body || '').split('\n')

            const meta = {}

            lines.forEach(line => {
              const idx =
                line.indexOf(':')

              if (idx === -1) return

              const key = line
                .slice(0, idx)
                .trim()
                .toLowerCase()

              const value = line
                .slice(idx + 1)
                .trim()

              meta[key] = value
            })

            return meta
          }

          async function getAllReleases() {
            let page = 1
            let all = []

            while (true) {
              const releases =
                await github(
                  `${API}?per_page=100&page=${page}`
                )

              if (
                !releases.length
              ) {
                break
              }

              all =
                all.concat(
                  releases
                )

              page++
            }

            return all
          }

          async function main() {
            const releases =
              await getAllReleases()

            const dataDir =
              path.join(
                process.cwd(),
                'data'
              )

            fs.mkdirSync(
              dataDir,
              { recursive: true }
            )

            const albums = []

            for (const release of releases) {
              const releaseMeta =
                parseReleaseName(
                  release.name
                )

              const bodyMeta =
                parseBody(
                  release.body
                )

              const assets =
                release.assets || []

              const cover =
                assets.find(
                  a =>
                    a.name ===
                    'cover.webp'
                )

              const tracks =
                assets
                  .filter(a =>
                    a.name.endsWith(
                      '.m4a'
                    )
                  )

                  .map(asset => {
                    const parsed =
                      parseFilename(
                        asset.name
                      )

                    return {
                      trackNumber:
                        parsed.trackNumber,

                      title:
                        parsed.title,

                      artists:
                        parsed.artists,

                      artistsDisplay:
                        parsed.artistsDisplay,

                      streamUrl:
                        `https://github.com/${OWNER}/${REPO}/releases/download/${release.tag_name}/${encodeURIComponent(asset.name)}`
                    }
                  })

                  .sort(
                    (a, b) =>
                      a.trackNumber -
                      b.trackNumber
                  )

              const albumJson = {
                id:
                  release.tag_name,

                title:
                  releaseMeta.title,

                coverUrl:
                  cover
                    ? cover.browser_download_url
                    : null,

                year:
                  bodyMeta.year ||
                  releaseMeta.year,

                primaryArtist:
                  bodyMeta.artist ||
                  releaseMeta.primaryArtist,

                genre:
                  bodyMeta.genre ||
                  '',

                description:
                  bodyMeta.description ||
                  '',

                tracks,
              }

              fs.writeFileSync(
                path.join(
                  dataDir,
                  `${release.tag_name}.json`
                ),

                JSON.stringify(
                  albumJson,
                  null,
                  2
                )
              )

              albums.push({
                id:
                  release.tag_name,

                title:
                  albumJson.title,

                coverUrl:
                  albumJson.coverUrl,

                year:
                  albumJson.year,

                trackCount:
                  tracks.length,

                metaUrl:
                  `https://cdn.jsdelivr.net/gh/${OWNER}/${REPO}@main/data/${release.tag_name}.json`,

                primaryArtist:
                  albumJson.primaryArtist,

                genre:
                  albumJson.genre,
              })
            }

            albums.sort((a, b) =>
              b.year.localeCompare(
                a.year
              )
            )

            const master = {
              generated:
                new Date().toISOString(),

              repo:
                `${OWNER}/${REPO}`,

              albums,
            }

            fs.writeFileSync(
              path.join(
                dataDir,
                'albums.json'
              ),

              JSON.stringify(
                master,
                null,
                2
              )
            )

            console.log(
              `Generated ${albums.length} albums`
            )
          }

          main().catch(err => {
            console.error(err)
            process.exit(1)
          })

          EOF

      - name: Commit metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data

          git diff --cached --quiet && exit 0

          git commit -m "Update generated metadata"

          git push origin HEAD:main
